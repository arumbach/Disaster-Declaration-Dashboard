    const chartMax = Math.ceil(maxRatio / 10) * 10;

    function fmtPct(val) {
        return val.toFixed(1) + '%';
    }

    function fmtDollars(val) {
        if (val >= 1000000) return '$' + (val / 1000000).toFixed(1) + 'B';
        if (val >= 1000) return '$' + (val / 1000).toFixed(1) + 'M';
        return '$' + val.toLocaleString('en-US') + 'K';
    }

    // ── Background ──
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    // Grid pattern
    ctx.strokeStyle = 'rgba(99, 102, 241, 0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // ── Card background ──
    const cardX = 60, cardY = 120, cardW = W - 120, cardH = H - 180;
    const cardR = 16;

    ctx.fillStyle = 'rgba(17, 24, 39, 0.85)';
    ctx.beginPath();
    ctx.roundRect(cardX, cardY, cardW, cardH, cardR);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(cardX, cardY, cardW, cardH, cardR);
    ctx.stroke();

    // Top gradient border
    const topGrad = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY);
    topGrad.addColorStop(0, '#6366f1');
    topGrad.addColorStop(0.5, '#a78bfa');
    topGrad.addColorStop(1, '#22d3ee');
    ctx.fillStyle = topGrad;
    ctx.fillRect(cardX, cardY, cardW, 3);

    // ── Title ──
    ctx.fillStyle = '#f1f5f9';
    ctx.font = '700 34px Inter';
    ctx.textAlign = 'left';
    ctx.fillText('SBA Disaster Loan Recovery Ratio', cardX + 36, cardY - 30);

    ctx.fillStyle = '#64748b';
    ctx.font = '400 18px Inter';
    ctx.fillText('Approved loan amounts as a share of verified losses  ·  By fiscal year', cardX + 36, cardY - 6);

    // ── KPI row ──
    const kpiY = cardY + 36;
    const kpis = [
        { label: 'Overall Average', value: fmtPct(avgRatio) },
        { label: 'Highest Year', value: fmtPct(highestYear.ratio) + ' (FY' + highestYear.year + ')' },
        { label: 'Lowest Year', value: fmtPct(lowestYear.ratio) + ' (FY' + lowestYear.year + ')' },
        { label: 'Years of Data', value: yearData.length.toString() }
    ];

    const kpiSpacing = (cardW - 72) / kpis.length;
    kpis.forEach((kpi, i) => {
        const kx = cardX + 36 + i * kpiSpacing;

        const valGrad = ctx.createLinearGradient(kx, kpiY, kx + 120, kpiY);
        valGrad.addColorStop(0, '#34d399');
        valGrad.addColorStop(1, '#22d3ee');
        ctx.fillStyle = valGrad;
        ctx.font = '700 26px Inter';
        ctx.textAlign = 'left';
        ctx.fillText(kpi.value, kx, kpiY + 20);

        ctx.fillStyle = '#64748b';
        ctx.font = '400 14px Inter';
        ctx.fillText(kpi.label, kx, kpiY + 38);
    });

    // ── Chart area ──
    const chartLeft = cardX + 90;
    const chartRight = cardX + cardW - 50;
    const chartTop = kpiY + 70;
    const chartBottom = cardY + cardH - 80;
    const chartW = chartRight - chartLeft;
    const chartH = chartBottom - chartTop;

    // Y-axis gridlines and labels
    const gridLines = 5;
    ctx.font = '400 14px Inter';
    ctx.textAlign = 'right';
    for (let i = 0; i <= gridLines; i++) {
        const val = (chartMax / gridLines) * i;
        const y = chartBottom - (val / chartMax) * chartH;

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(chartLeft, y);
        ctx.lineTo(chartRight, y);
        ctx.stroke();

        ctx.fillStyle = '#64748b';
        ctx.fillText(val.toFixed(0) + '%', chartLeft - 10, y + 4);
    }

    // Average reference line
    const avgY = chartBottom - (avgRatio / chartMax) * chartH;
    ctx.strokeStyle = 'rgba(250, 204, 21, 0.8)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(chartLeft, avgY);
    ctx.lineTo(chartRight, avgY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Average label
    ctx.fillStyle = 'rgba(250, 204, 21, 1.0)';
    ctx.font = '600 14px Inter';
    ctx.textAlign = 'left';
    ctx.fillText('Average: ' + fmtPct(avgRatio), chartRight + 6, avgY + 4);

    // ── Bars ──
    const numBars = yearData.length;
    const barGap = 8;
    const totalGapWidth = barGap * (numBars - 1);

    const availableWidth = chartW - totalGapWidth;
    const barW = Math.min(availableWidth / numBars, 80);

    // Center bars
    const totalBarsWidth = numBars * barW + totalGapWidth;

    yearData.forEach((d, i) => {
        const x = startX + i * (barW + barGap);
        const barHeight = (d.ratio / chartMax) * chartH;
        const y = chartBottom - barHeight;

        const isAboveAvg = d.ratio >= avgRatio;
        const baseColor = isAboveAvg ? [52, 211, 153] : [251, 113, 133]; // green or rose

        // Bar fill
        const barGradient = ctx.createLinearGradient(x, chartBottom, x, y);
        barGradient.addColorStop(0, `rgba(${baseColor.join(',')}, 0.25)`);
        barGradient.addColorStop(1, `rgba(${baseColor.join(',')}, 0.85)`);
        ctx.fillStyle = barGradient;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barHeight, [4, 4, 0, 0]);
        ctx.fill();

        // Bar border
        ctx.strokeStyle = `rgba(${baseColor.join(',')}, 0.7)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barHeight, [4, 4, 0, 0]);
        ctx.stroke();

        // Ratio label above bar
        ctx.fillStyle = '#f1f5f9';
        ctx.font = '700 13px Inter';
        ctx.textAlign = 'center';
        ctx.fillText(fmtPct(d.ratio), x + barW / 2, y - 8);

        // Year label below
        ctx.fillStyle = '#94a3b8';
        ctx.font = '600 13px Inter';
        ctx.textAlign = 'center';
        ctx.fillText('FY' + d.year, x + barW / 2, chartBottom + 18);
    });



    // ── Legend ──
    const legendY = chartBottom + 50;
    const legendItems = [
        { label: 'Above average', c: 'rgba(52, 211, 153, 0.9)' },
        { label: 'Below average', c: 'rgba(251, 113, 133, 0.9)' },
        { label: 'Overall average', c: 'rgba(250, 204, 21, 0.9)' }
    ];

    let legendX = chartLeft;
    ctx.font = '400 14px Inter';
    legendItems.forEach(item => {
        if (item.label === 'Overall average') {
            // Dashed line
            ctx.strokeStyle = item.c;
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(legendX, legendY - 1);
            ctx.lineTo(legendX + 16, legendY - 1);
            ctx.stroke();
            ctx.setLineDash([]);
        } else {
            ctx.fillStyle = item.c;
            ctx.beginPath();
            ctx.roundRect(legendX, legendY - 8, 12, 12, 2);
            ctx.fill();
        }
        legendX += 20;

        ctx.fillStyle = '#64748b';
        ctx.textAlign = 'left';
        ctx.fillText(item.label, legendX, legendY + 2);
        legendX += ctx.measureText(item.label).width + 28;
    });

    // ── Source note ──
    const sourceY = H - 64;
    ctx.fillStyle = '#64748b';
    ctx.font = '400 13px Inter';
    ctx.textAlign = 'left';
    ctx.fillText('Source: SBA Open Data Portal (Disaster Loan Data). Recovery ratio = total approved loan amounts \u00F7 total verified losses.', cardX + 36, sourceY);
    ctx.fillText('Dollar values in original (non-inflation-adjusted) thousands. Covers FY2000\u20132022.', cardX + 36, sourceY + 16);

    // ── Watermark ──
    ctx.fillStyle = 'rgba(100, 116, 139, 0.3)';
    ctx.font = '400 13px Inter';
    ctx.textAlign = 'right';
    ctx.fillText('disasterlab.org', W - 70, H - 20);

    // ── Download button ──
    document.getElementById('downloadBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'sba-recovery-ratio-by-year.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>
</body>
</html>
