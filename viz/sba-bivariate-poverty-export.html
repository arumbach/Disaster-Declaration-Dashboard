    ctx.fillText(ratioT1.toFixed(1) + '\u00d7', legX - 4, legY + 2 * (legSize + legGap) + legSize / 2 + 3);
    ctx.fillText(ratioT2.toFixed(1) + '\u00d7', legX - 4, legY + (legSize + legGap) + legSize / 2 + 3);

    // __ Source note __
    ctx.fillStyle = '#94a3b8';
    ctx.font = '400 13px Inter';
    ctx.textAlign = 'left';
    ctx.fillText('Data: SBA Open Data Portal (FY2000\u20132022); U.S. Census Bureau, 2023 ACS 5-Year Estimates (Table B17001).', cardX + 36, H - 64);
    ctx.fillText('Counties shown have both SBA disaster loan activity and ACS poverty data. Damage ratio = verified loss \u00F7 approved loans.', cardX + 36, H - 48);

    // __ Watermark __
    ctx.fillStyle = 'rgba(148, 163, 184, 0.5)';
    ctx.font = '400 13px Inter';
    ctx.textAlign = 'right';
    ctx.fillText('disasterlab.org', W - 70, H - 20);

    // __ Download __
    document.getElementById('downloadBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'sba-disaster-damage-poverty-bivariate.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
});
</script>
